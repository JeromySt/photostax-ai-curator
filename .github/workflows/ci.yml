name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # Build and test class libraries on all platforms (no MAUI needed)
  build:
    permissions:
      contents: read
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v6

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.0.x'

    - name: Cache NuGet packages
      uses: actions/cache@v5
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
        restore-keys: ${{ runner.os }}-nuget-

    - name: Restore dependencies
      run: |
        dotnet restore src/PhotostaxAiCurator.Domain/PhotostaxAiCurator.Domain.csproj
        dotnet restore src/PhotostaxAiCurator.Services/PhotostaxAiCurator.Services.csproj
        dotnet restore src/PhotostaxAiCurator.Infrastructure/PhotostaxAiCurator.Infrastructure.csproj
        dotnet restore tests/PhotostaxAiCurator.Domain.Tests/PhotostaxAiCurator.Domain.Tests.csproj
        dotnet restore tests/PhotostaxAiCurator.Services.Tests/PhotostaxAiCurator.Services.Tests.csproj

    - name: Build
      run: |
        dotnet build src/PhotostaxAiCurator.Domain/PhotostaxAiCurator.Domain.csproj --no-restore --configuration Release
        dotnet build src/PhotostaxAiCurator.Services/PhotostaxAiCurator.Services.csproj --no-restore --configuration Release
        dotnet build src/PhotostaxAiCurator.Infrastructure/PhotostaxAiCurator.Infrastructure.csproj --no-restore --configuration Release
        dotnet build tests/PhotostaxAiCurator.Domain.Tests/PhotostaxAiCurator.Domain.Tests.csproj --no-restore --configuration Release
        dotnet build tests/PhotostaxAiCurator.Services.Tests/PhotostaxAiCurator.Services.Tests.csproj --no-restore --configuration Release

    - name: Test
      run: |
        dotnet test tests/PhotostaxAiCurator.Domain.Tests/PhotostaxAiCurator.Domain.Tests.csproj --no-build --configuration Release --verbosity normal
        dotnet test tests/PhotostaxAiCurator.Services.Tests/PhotostaxAiCurator.Services.Tests.csproj --no-build --configuration Release --verbosity normal

  # Build MAUI app on Windows (only platform with full MAUI CI support currently)
  build-maui:
    permissions:
      contents: read
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v6

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.0.x'

    - name: Install MAUI workload
      run: dotnet workload install maui

    - name: Cache NuGet packages
      uses: actions/cache@v5
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-maui-${{ hashFiles('**/*.csproj') }}
        restore-keys: ${{ runner.os }}-nuget-maui-

    - name: Restore dependencies
      run: dotnet restore

    - name: Build MAUI app (Windows)
      run: dotnet build src/PhotostaxAiCurator.App/PhotostaxAiCurator.App.csproj --configuration Release -f net10.0-windows10.0.19041.0

  security:
    permissions:
      contents: read
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.0.x'

    - name: Restore non-MAUI projects
      run: |
        dotnet restore src/PhotostaxAiCurator.Domain/PhotostaxAiCurator.Domain.csproj
        dotnet restore src/PhotostaxAiCurator.Services/PhotostaxAiCurator.Services.csproj
        dotnet restore src/PhotostaxAiCurator.Infrastructure/PhotostaxAiCurator.Infrastructure.csproj

    - name: Check for vulnerable packages
      run: |
        dotnet list src/PhotostaxAiCurator.Domain/PhotostaxAiCurator.Domain.csproj package --vulnerable --include-transitive
        dotnet list src/PhotostaxAiCurator.Services/PhotostaxAiCurator.Services.csproj package --vulnerable --include-transitive
        dotnet list src/PhotostaxAiCurator.Infrastructure/PhotostaxAiCurator.Infrastructure.csproj package --vulnerable --include-transitive
      continue-on-error: true

  # Auto-create pre-release on push to main
  prerelease:
    name: Create Pre-release
    needs: [build, build-maui]
    runs-on: windows-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.0.x'

    - name: Install MAUI workload
      run: dotnet workload install maui

    - name: Build release
      run: dotnet build --configuration Release

    - name: Get version and generate tag
      id: version
      shell: bash
      run: |
        VERSION=$(grep -oPm1 '(?<=<Version>)[^<]+' src/PhotostaxAiCurator.App/PhotostaxAiCurator.App.csproj || echo "0.1.0")
        SHORT_SHA=$(git rev-parse --short HEAD)
        TIMESTAMP=$(date +%Y%m%d%H%M%S)
        TAG="v${VERSION}-pre.${TIMESTAMP}.${SHORT_SHA}"
        echo "version=${VERSION}" >> $GITHUB_OUTPUT
        echo "tag=${TAG}" >> $GITHUB_OUTPUT
        echo "Generated pre-release tag: ${TAG}"

    - name: Create pre-release tag
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git tag ${{ steps.version.outputs.tag }}
        git push origin ${{ steps.version.outputs.tag }}

    - name: Create GitHub Pre-release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.version.outputs.tag }}
        name: Pre-release ${{ steps.version.outputs.tag }}
        prerelease: true
        generate_release_notes: true
