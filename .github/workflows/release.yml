name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-release:
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            artifact: photostax-ai-curator-windows-x64
          - os: macos-latest
            rid: osx-arm64
            artifact: photostax-ai-curator-macos-arm64
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v6

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.0.x'

    - name: Install MAUI workload
      run: dotnet workload install maui

    - name: Publish for ${{ matrix.rid }}
      run: >
        dotnet publish src/PhotostaxAiCurator.App/PhotostaxAiCurator.App.csproj
        --configuration Release
        --runtime ${{ matrix.rid }}
        --output ./publish/${{ matrix.artifact }}

    - name: Upload artifact
      uses: actions/upload-artifact@v7
      with:
        name: ${{ matrix.artifact }}
        path: ./publish/${{ matrix.artifact }}
        retention-days: 5

  release:
    needs: build-release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v6

    - name: Download all artifacts
      uses: actions/download-artifact@v8
      with:
        path: artifacts

    - name: Package platform archives
      run: |
        cd artifacts
        for dir in */; do
          name="${dir%/}"
          tar czf "../${name}.tar.gz" -C "$dir" .
        done
        cd ..
        ls -la *.tar.gz

    - name: Get version from tag
      id: version
      run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: "*.tar.gz"
        generate_release_notes: true
        draft: false
        prerelease: ${{ contains(github.ref, '-beta') || contains(github.ref, '-alpha') || contains(github.ref, '-preview') || contains(github.ref, '-pre.') }}
